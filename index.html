<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업비트(Upbit) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-[#66fcf1] mb-2"><i class="fab fa-bitcoin"></i> 1004MAS UPBIT RADAR</h1>
    <p class="text-gray-400 mb-8">김치 프리미엄 및 세력 펌핑 코인 (KRW) 실시간 감시</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-xl relative overflow-hidden">
            <h2 class="text-xl font-bold text-white mb-4">현재 상승률 1위 (Top Gainer)</h2>
            <div id="ticker-box" class="flex justify-between items-center bg-black/50 p-4 rounded-lg border border-transparent transition-all duration-300">
                <span id="top-gainer-name" class="text-2xl font-bold text-white">데이터 로딩중...</span>
                <span id="top-gainer-rate" class="text-2xl font-black text-gray-400">---%</span>
            </div>
            <p id="top-gainer-vol" class="text-right text-sm text-gray-500 mt-2">거래대금 스캔 중...</p>
        </div>
        
        <div class="glass p-6 rounded-xl border-l-4 border-red-500 relative">
            <h2 class="text-lg font-bold text-white mb-2 flex items-center justify-between">
                <div><i class="fas fa-brain"></i> 제갈량 판결 (Verdicts)</div>
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse" title="라이브 수신 중"></div>
            </h2>
            <p id="ai-verdict-text" class="text-gray-300 text-sm leading-relaxed whitespace-pre-line">
                AI 데이터를 수신 중입니다...
            </p>
        </div>
    </div>
    
    <div class="mt-8 text-center"><a href="https://www.1004mas.com" class="text-[#45a29e] hover:text-white underline">포탈(Portal) 복귀</a></div>
    
    <!-- 1004MAS Upbit Real-time Engine -->
    <script>
        let krwMarketCodes = [];
        let krwMarketNames = {};
        
        async function initUpbitEngine() {
            try {
                // 1. Get all KRW markets
                const res = await fetch('https://api.upbit.com/v1/market/all');
                const markets = await res.json();
                
                markets.forEach(m => {
                    if (m.market.startsWith('KRW-')) {
                        krwMarketCodes.push(m.market);
                        krwMarketNames[m.market] = m.korean_name; // e.g., '비트코인'
                    }
                });
                
                // 2. Fetch immediately, then loop every 2 seconds
                fetchTopGainer();
                setInterval(fetchTopGainer, 2000);
                
                // 3. Start AI Verdict Engine (fetch every 60 seconds)
                fetchAIVerdict();
                setInterval(fetchAIVerdict, 60000);
            } catch (error) {
                console.error("Upbit Engine Init Error:", error);
                document.getElementById('top-gainer-name').innerText = "통신 에러";
            }
        }

        async function fetchAIVerdict() {
            try {
                // Fetch public JSONBin without API Key
                const res = await fetch('https://api.jsonbin.io/v3/b/69d06b37aaba882197c2124a?meta=false');
                const data = await res.json();
                if(data.verdict) {
                    document.getElementById('ai-verdict-text').innerText = data.verdict;
                }
            } catch(e) {
                console.error("Verdict Fetch Error:", e);
            }
        }

        let previousRate = 0;

        async function fetchTopGainer() {
            if (krwMarketCodes.length === 0) return;
            try {
                const query = krwMarketCodes.join(',');
                const res = await fetch('https://api.upbit.com/v1/ticker?markets=' + query);
                const tickers = await res.json();
                
                // Find top gainer
                let topGainer = tickers[0];
                for(let t of tickers) {
                    if(t.signed_change_rate > topGainer.signed_change_rate) {
                        topGainer = t;
                    }
                }
                
                // Format Data
                const marketCode = topGainer.market;
                const koreanName = krwMarketNames[marketCode];
                const changeRate = (topGainer.signed_change_rate * 100).toFixed(2);
                const tradeVolUeok = Math.floor(topGainer.acc_trade_price_24h / 100000000).toLocaleString(); // 억 단위
                
                // Check if rate increased or decreased for flash effect
                const tickerBox = document.getElementById('ticker-box');
                const rateEl = document.getElementById('top-gainer-rate');
                
                if (changeRate > previousRate) {
                    tickerBox.classList.add('border-red-500', 'bg-red-900/20');
                    setTimeout(() => tickerBox.classList.remove('border-red-500', 'bg-red-900/20'), 300);
                } else if (changeRate < previousRate) {
                    tickerBox.classList.add('border-blue-500', 'bg-blue-900/20');
                    setTimeout(() => tickerBox.classList.remove('border-blue-500', 'bg-blue-900/20'), 300);
                }
                previousRate = changeRate;
                
                // Update DOM
                document.getElementById('top-gainer-name').innerHTML = `${koreanName} <span class="text-sm text-gray-500 ml-2">${marketCode.replace('KRW-','')}</span>`;
                
                if (topGainer.signed_change_rate > 0) {
                    rateEl.innerText = `+${changeRate}%`;
                    rateEl.className = "text-2xl font-black text-red-500";
                } else {
                    rateEl.innerText = `${changeRate}%`;
                    rateEl.className = "text-2xl font-black text-blue-500";
                }
                
                document.getElementById('top-gainer-vol').innerText = `거래대금 ${tradeVolUeok}억 돌파`;
                
            } catch (error) {
                console.error("Upbit Fetch Error:", error);
            }
        }
        
        // Start Engine
        initUpbitEngine();
    </script>
</body>
</html>
