<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업비트(Upbit) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-[#66fcf1] mb-2"><i class="fab fa-bitcoin"></i> 1004MAS UPBIT RADAR</h1>
    <p class="text-gray-400 mb-8">김치 프리미엄 및 세력 펌핑 코인 (KRW) 실시간 감시</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold text-white mb-4">현재 대장주 (Top Gainer)</h2>
            <div class="flex justify-between items-center bg-black/50 p-4 rounded-lg">
                <span class="text-2xl font-bold text-white">ONG-KRW</span>
                <span class="text-2xl font-black text-red-500">+43.56%</span>
            </div>
            <p class="text-right text-sm text-gray-500 mt-2">거래대금 753억 돌파</p>
        </div>
        
        <div class="glass p-6 rounded-xl border-l-4 border-red-500">
            <h2 class="text-lg font-bold text-white mb-2"><i class="fas fa-brain"></i> 제갈량 판결 (Verdicts)</h2>
            <p class="text-gray-300 text-sm leading-relaxed">
                "특징주 외신/공시 기사 전무. 전형적인 세력 개입 펌핑 종목으로 추정되니 진입을 경계하십시오."
            </p>
        </div>
    </div>
    
    <div class="mt-8 text-center"><a href="https://www.1004mas.com" class="text-[#45a29e] hover:text-white underline">포탈(Portal) 복귀</a></div>
</body>
</html>
